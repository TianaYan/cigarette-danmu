<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>一根烟 · 匿名弹幕</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="stage" id="stage">
    <!-- 弹幕层：所有匿名消息飘过这里 -->
    <div class="danmu-layer" id="danmuLayer" aria-hidden="true"></div>

    <!-- 烟与火：垂直居中，绝对定位 -->
    <section class="cig-wrap" id="cigWrap" aria-label="虚拟烟">
      <!-- 烟雾 canvas (绝对定位,跟随烟头位置) -->
      <canvas id="smokeCanvas" class="smoke-canvas" aria-hidden="true"></canvas>

      <!-- 打火机 (点烟时出现) -->
      <svg class="lighter" id="lighter" viewBox="0 0 60 100" aria-hidden="true">
        <defs>
          <linearGradient id="lighterBody" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"  stop-color="#2a2a2a"/>
            <stop offset="50%" stop-color="#4a4a4a"/>
            <stop offset="100%" stop-color="#1a1a1a"/>
          </linearGradient>
        </defs>
        <!-- 打火机主体 -->
        <rect x="10" y="20" width="40" height="70" fill="url(#lighterBody)"/>
        <!-- 打火机暗边 -->
        <rect x="10" y="20" width="2" height="70" fill="#000"/>
        <rect x="48" y="20" width="2" height="70" fill="#000"/>
        <!-- 打火机顶部金属 (火口) -->
        <rect x="8" y="10" width="44" height="12" fill="#888"/>
        <rect x="8" y="10" width="44" height="2" fill="#bbb"/>
        <rect x="8" y="20" width="44" height="2" fill="#444"/>
        <!-- 火口缝隙 -->
        <rect x="28" y="10" width="4" height="6" fill="#1a1a1a"/>
        <!-- 按按钮 -->
        <rect x="35" y="32" width="12" height="6" fill="#d04020"/>
        <rect x="35" y="32" width="12" height="2" fill="#ff7a3a"/>
        <!-- 中部品牌贴纸 -->
        <rect x="14" y="55" width="32" height="14" fill="#8a1a1a"/>
        <text x="30" y="65" text-anchor="middle" font-size="8" fill="#e8c8a8" font-family="monospace" font-weight="bold">FUER</text>
        <!-- 底部暗边 -->
        <rect x="10" y="88" width="40" height="2" fill="#000"/>
      </svg>

      <!-- 打火机火苗 (动态) -->
      <svg class="lighter-flame" id="lighterFlame" viewBox="0 0 30 50" aria-hidden="true">
        <defs>
          <radialGradient id="flameCore" cx="0.5" cy="0.7" r="0.5">
            <stop offset="0%"  stop-color="#fff2b0"/>
            <stop offset="40%" stop-color="#ff8a2a"/>
            <stop offset="100%" stop-color="#5a1a00" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <!-- 外焰 (橘红) -->
        <ellipse cx="15" cy="35" rx="10" ry="13" fill="url(#flameCore)"/>
        <!-- 内焰 (黄白) -->
        <ellipse cx="15" cy="32" rx="5" ry="8" fill="#fff2b0" opacity="0.8"/>
        <!-- 焰心 (亮白) -->
        <ellipse cx="15" cy="30" rx="2" ry="4" fill="#fff" opacity="0.9"/>
        <!-- 火星 (小颗粒) -->
        <rect x="8" y="20" width="2" height="2" fill="#ffd680" opacity="0.8"/>
        <rect x="20" y="15" width="1" height="1" fill="#ffe0a0" opacity="0.7"/>
        <rect x="12" y="10" width="1" height="1" fill="#ffb060" opacity="0.6"/>
      </svg>

      <!-- 烟主体 - 像素风, 整根烟由方块拼成 -->
      <svg class="cig" id="cigSvg" viewBox="0 0 40 200" preserveAspectRatio="xMidYMax meet" shape-rendering="crispEdges" aria-hidden="true">
        <defs>
          <!-- 火星径向(纯硬边) -->
          <radialGradient id="emberGrad" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0%"  stop-color="#fff2b0"/>
            <stop offset="40%" stop-color="#ff8a2a"/>
            <stop offset="100%" stop-color="#5a1a00" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!--
          像素风烟主体:
          烟纸: x=14..26 (宽 12), y=20..163 (高 143) - 主体白
          滤嘴: x=14..26, y=163..200 - 棕黄
          烟灰: 跟随燃烧下移 (JS 控制)
          火星: 贴在烟灰顶端
        -->

        <!-- 滤嘴 - 由 JS 永久绘制 (固定 168-200, 32px, 不变色) -->
        <g id="cigFilter"></g>

        <!-- 烟纸 - 由 JS 按 burnPercent 动态绘制 (从 yEnd 到 PAPER_BOTTOM) -->
        <g id="cigPaper"></g>

        <!-- 烟灰 - 跟随燃烧下移 -->
        <g id="cigAsh">
          <!-- 灰色方块分层(像素感) -->
        </g>

        <!-- 火星 - 椭圆(这里用方块近似) -->
        <g id="cigEmber" opacity="0">
          <rect x="14" y="-3" width="12" height="2" fill="#ff8a2a"/>
          <rect x="13" y="-4" width="14" height="1" fill="#ffcf6a"/>
          <rect x="13" y="-1" width="14" height="1" fill="#ff5a1a"/>
          <rect x="16" y="-4" width="8" height="1" fill="#fff2b0"/>
        </g>

        <!-- 点烟时的小火花 -->
        <g id="cigSpark" opacity="0">
          <rect x="19" y="-3" width="2" height="2" fill="#ffd680"/>
          <rect x="16" y="-1" width="1" height="1" fill="#ffb060"/>
          <rect x="23" y="-4" width="1" height="1" fill="#ffe0a0"/>
        </g>
      </svg>

      <!-- 点烟按钮 - 移到烟的右侧, 不挡烟 -->
      <button class="ignite-btn" id="igniteBtn" type="button" aria-label="点烟">
        <span class="ignite-btn__dot"></span>
        <span class="ignite-btn__label" id="igniteLabel">点烟</span>
      </button>

      <!-- 熄灭按钮 - 与点烟按钮并排, 燃烧中显示 -->
      <button class="extinguish-btn" id="extinguishBtn" type="button" aria-label="熄灭" hidden>
        <span class="extinguish-btn__icon">×</span>
        <span class="extinguish-btn__label" id="extinguishLabel">熄灭</span>
      </button>

      <!-- 吐烟圈按钮 - 燃烧中显示, 与熄灭按钮并排 -->
      <button class="ring-btn" id="ringBtn" type="button" aria-label="吐烟圈" hidden>
        <span class="ring-btn__icon">○</span>
        <span class="ring-btn__label" id="ringLabel">吐个烟圈</span>
      </button>
    </section>

    <!-- 底部弹幕输入栏 -->
    <form class="composer" id="composer" autocomplete="off">
      <input
        class="composer__input"
        id="danmuInput"
        type="text"
        inputmode="text"
        maxlength="40"
        placeholder="匿名说点什么…"
        aria-label="发送匿名弹幕"
      />
      <button class="composer__send" id="sendBtn" type="submit" aria-label="发送">发</button>
    </form>

    <!-- 工具按钮行: 导出 / 清空 -->
    <div class="toolbar">
      <button class="toolbar__btn toolbar__btn--export" id="exportBtn" type="button" title="把"我发过的弹幕"导出成 .txt">
        <span class="toolbar__icon">↓</span>
        <span class="toolbar__label">导出我的弹幕</span>
      </button>
      <button class="toolbar__btn toolbar__btn--clear" id="clearBtn" type="button" title="清空记录">
        <span class="toolbar__icon">×</span>
        <span class="toolbar__label">清空</span>
      </button>
    </div>

    <!-- 顶部状态条 -->
    <header class="topbar">
      <span class="topbar__title">一根烟</span>
      <span class="topbar__count" id="onlineCount" title="在线人数">·</span>
      <span class="topbar__hint" id="topHint"></span>
    </header>
  </main>

  <!-- Supabase JS SDK (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./config.js"></script>
  <script defer src="./cigarette.js"></script>
  <script defer src="./danmu.js"></script>
  <script defer src="./app.js"></script>
</body>
</html>
