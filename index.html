<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>一根烟 · 匿名弹幕</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="stage" id="stage">
    <!-- 弹幕层：所有匿名消息飘过这里 -->
    <div class="danmu-layer" id="danmuLayer" aria-hidden="true"></div>

    <!-- 烟与火：垂直居中，绝对定位 -->
    <section class="cig-wrap" id="cigWrap" aria-label="虚拟烟">
      <!-- 烟雾粒子层 -->
      <div class="smoke" id="smoke"></div>

      <!-- 烟本体 -->
      <svg class="cig" id="cigSvg" viewBox="0 0 40 200" preserveAspectRatio="xMidYMax meet" aria-hidden="true">
        <defs>
          <!-- 滤嘴渐变（棕黄） -->
          <linearGradient id="filterGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"  stop-color="#7a4a1c"/>
            <stop offset="50%" stop-color="#b27a3a"/>
            <stop offset="100%" stop-color="#7a4a1c"/>
          </linearGradient>
          <!-- 烟纸渐变（白） -->
          <linearGradient id="paperGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"  stop-color="#e8e6e0"/>
            <stop offset="50%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#d8d6d0"/>
          </linearGradient>
          <!-- 烟灰渐变（灰白） -->
          <linearGradient id="ashGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"  stop-color="#4a4a4a"/>
            <stop offset="50%" stop-color="#7a7a7a"/>
            <stop offset="100%" stop-color="#3a3a3a"/>
          </linearGradient>
          <!-- 火星径向 -->
          <radialGradient id="emberGrad" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0%"  stop-color="#fff2b0"/>
            <stop offset="40%" stop-color="#ff8a2a"/>
            <stop offset="100%" stop-color="#5a1a00" stop-opacity="0"/>
          </radialGradient>
          <!-- 火星辉光 -->
          <filter id="emberGlow" x="-200%" y="-200%" width="500%" height="500%">
            <feGaussianBlur stdDeviation="1.5"/>
          </filter>
        </defs>

        <!-- 滤嘴（底部 35px） -->
        <rect id="cigFilter" x="12" y="165" width="16" height="32" rx="2" fill="url(#filterGrad)"/>
        <!-- 滤嘴与纸的分割线（金边） -->
        <rect x="10" y="163" width="20" height="3" fill="#c79a4a"/>

        <!-- 烟纸（剩余部分） -->
        <rect id="cigPaper" x="13" y="20" width="14" height="143" fill="url(#paperGrad)"/>
        <!-- 烟灰（覆盖在纸的顶端，随燃烧下移） -->
        <rect id="cigAsh" x="13" y="20" width="14" height="0" fill="url(#ashGrad)" opacity="0.9"/>

        <!-- 火星（贴在烟灰顶端） -->
        <ellipse id="cigEmber" cx="20" cy="20" rx="6" ry="2.5" fill="url(#emberGrad)" filter="url(#emberGlow)" opacity="0"/>

        <!-- 点烟时的小火花 -->
        <g id="cigSpark" opacity="0">
          <circle cx="20" cy="20" r="1.2" fill="#ffd680"/>
          <circle cx="17" cy="22" r="0.8" fill="#ffb060"/>
          <circle cx="23" cy="18" r="0.7" fill="#ffe0a0"/>
        </g>
      </svg>

      <!-- 点烟按钮（覆盖在滤嘴区域，方便拇指按） -->
      <button class="ignite-btn" id="igniteBtn" type="button" aria-label="点烟">
        <span class="ignite-btn__dot"></span>
        <span class="ignite-btn__label" id="igniteLabel">点烟</span>
      </button>
    </section>

    <!-- 底部弹幕输入栏 -->
    <form class="composer" id="composer" autocomplete="off">
      <input
        class="composer__input"
        id="danmuInput"
        type="text"
        inputmode="text"
        maxlength="40"
        placeholder="匿名说点什么…"
        aria-label="发送匿名弹幕"
      />
      <button class="composer__send" id="sendBtn" type="submit" aria-label="发送">发</button>
    </form>

    <!-- 工具按钮行: 导出 / 清空 -->
    <div class="toolbar">
      <button class="toolbar__btn toolbar__btn--export" id="exportBtn" type="button" title="把"我发过的弹幕"导出成 .txt">
        <span class="toolbar__icon">↓</span>
        <span class="toolbar__label">导出我的弹幕</span>
      </button>
      <button class="toolbar__btn toolbar__btn--clear" id="clearBtn" type="button" title="清空记录">
        <span class="toolbar__icon">×</span>
        <span class="toolbar__label">清空</span>
      </button>
    </div>

    <!-- 顶部状态条 -->
    <header class="topbar">
      <span class="topbar__title">一根烟</span>
      <span class="topbar__count" id="onlineCount" title="在线人数">·</span>
      <span class="topbar__hint" id="topHint"></span>
    </header>
  </main>

  <!-- Supabase JS SDK (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./config.js"></script>
  <script defer src="./cigarette.js"></script>
  <script defer src="./danmu.js"></script>
  <script defer src="./app.js"></script>
</body>
</html>
